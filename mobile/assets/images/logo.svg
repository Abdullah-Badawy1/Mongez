<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 88" role="img" aria-label="Mongez">
  <defs>
    <linearGradient id="mngz-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#1B4F72"/>
    </linearGradient>
    <linearGradient id="mngz-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded badge -->
  <rect x="6" y="10" width="68" height="68" rx="18" fill="url(#mngz-badge)"/>
  <rect x="6" y="10" width="68" height="34" rx="18" fill="url(#mngz-highlight)"/>

  <!-- Wrench — open jaw + box end, rotated for motion -->
  <g transform="translate(40,44) rotate(-32)" fill="#ffffff">
    <!-- handle -->
    <rect x="-12" y="-4" width="26" height="8" rx="3"/>
    <!-- open-end jaw (right) -->
    <path d="M 12 -12
             a 14 14 0 1 1 0 24
             l 0 -6
             a 8 8 0 1 0 0 -12 z"/>
    <!-- box-end / hex socket (left) -->
    <path d="M -12 -2
             l -6 -8
             l -8 0
             l -4 10
             l 4 10
             l 8 0
             l 6 -8
             z"/>
    <circle cx="-21" cy="0" r="4" fill="#1B4F72"/>
  </g>

  <!-- Wordmark (English) -->
  <text x="92" y="46"
        font-family="'Helvetica Neue','Inter','Segoe UI',Arial,sans-serif"
        font-weight="800" font-size="32" fill="#2c3e50"
        letter-spacing="-0.5">Mongez</text>

  <!-- Wordmark (Arabic) -->
  <text x="92" y="70"
        font-family="'Cairo','Noto Sans Arabic','Segoe UI',sans-serif"
        font-weight="700" font-size="18" fill="#3498DB" direction="rtl">منجز</text>

  <!-- Tag underline accent -->
  <rect x="92" y="50" width="44" height="3" rx="1.5" fill="#2ECC71"/>
</svg>
