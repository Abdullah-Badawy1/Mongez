services:
  web:
    build: .
    image: mongez-backend:latest
    container_name: mongez-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # SQLite path must live on the named volume so data survives rebuilds.
      SQLITE_PATH: /app/data/db.sqlite3
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/api/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  sqlite_data:
  media_data:
